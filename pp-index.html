<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Planning Poker</title>
  <meta name="description" content="Free real-time planning poker for agile teams. Create a room, share the code, vote together."/>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=JetBrains+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>

  <!-- Firebase SDK (v9 compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <style>
  /* ── Reset & base ─────────────────────────────────────────────────── */
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  /* ── Design tokens ────────────────────────────────────────────────── */
  :root {
    --bg:#0d0f14; --bg-card:#13161d; --bg-hover:#1a1e28;
    --border:#1f2330; --border-light:#2a2f42;
    --azure:#0078d4; --azure-glow:rgba(0,120,212,0.12); --azure-light:#50aeff;
    --text:#e8eaf0; --text-muted:#7a8099; --text-dim:#4a5070;
    --green:#4ec994; --amber:#f5a623;
    --font-display:'Fraunces',Georgia,serif;
    --font-mono:'JetBrains Mono',monospace;
    --font-body:'DM Sans',sans-serif;
  }
  [data-theme="light"] {
    --bg:#f8f9fb; --bg-card:#ffffff; --bg-hover:#f0f2f7;
    --border:#e2e5ed; --border-light:#d0d5e0;
    --azure:#0066b8; --azure-glow:rgba(0,102,184,0.08); --azure-light:#0066b8;
    --text:#111827; --text-muted:#4b5563; --text-dim:#9ca3af;
    --green:#059669; --amber:#b45309;
  }

  html { scroll-behavior:smooth }
  body {
    background:var(--bg); color:var(--text);
    font-family:var(--font-body); font-size:16px; line-height:1.65;
    -webkit-font-smoothing:antialiased; transition:background .25s,color .25s;
    min-height:100vh;
  }
  body::before {
    content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image:radial-gradient(circle,rgba(0,120,212,0.055) 1px,transparent 1px);
    background-size:28px 28px;
    mask-image:radial-gradient(ellipse 100% 100% at 50% 50%,black 30%,transparent 100%);
  }
  [data-theme="light"] body::before {
    background-image:radial-gradient(circle,rgba(0,102,184,0.07) 1px,transparent 1px);
  }
  body > * { position:relative; z-index:1 }

  /* ── Topbar ───────────────────────────────────────────────────────── */
  .topbar {
    position:fixed; top:0; left:0; right:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 32px; height:56px;
    background:rgba(13,15,20,0.88); backdrop-filter:blur(14px);
    border-bottom:1px solid var(--border); transition:background .25s;
  }
  [data-theme="light"] .topbar { background:rgba(248,249,251,0.92) }
  .topbar-logo {
    font-family:var(--font-mono); font-size:13px;
    color:var(--azure-light); text-decoration:none; letter-spacing:.02em;
  }
  [data-theme="light"] .topbar-logo { color:var(--azure) }
  .topbar-right { display:flex; align-items:center; gap:12px }
  .topbar-gh {
    display:flex; align-items:center; gap:6px;
    font-family:var(--font-mono); font-size:11px;
    color:var(--text-muted); text-decoration:none;
    padding:5px 10px; border-radius:6px; border:1px solid var(--border-light);
    transition:all .2s;
  }
  .topbar-gh:hover { color:var(--text); border-color:var(--azure-light); background:var(--bg-hover) }
  .topbar-gh svg { width:14px; height:14px; fill:currentColor; flex-shrink:0 }
  .theme-toggle {
    width:32px; height:32px; border-radius:8px; border:1px solid var(--border-light);
    background:transparent; cursor:pointer; display:flex; align-items:center;
    justify-content:center; color:var(--text-muted); transition:all .2s; font-size:14px;
  }
  .theme-toggle:hover { background:var(--bg-hover); color:var(--text) }

  /* ── Page shell ───────────────────────────────────────────────────── */
  .pp-page { max-width:860px; margin:0 auto; padding:76px 24px 60px; min-height:100vh }

  /* ── Lobby ────────────────────────────────────────────────────────── */
  .pp-lobby { max-width:440px; margin:0 auto; text-align:center; padding-top:40px }
  .pp-logo { font-family:var(--font-display); font-size:clamp(32px,5vw,52px); font-weight:300; margin-bottom:8px }
  .pp-logo em { font-style:italic; color:var(--azure-light) }
  [data-theme="light"] .pp-logo em { color:var(--azure) }
  .pp-tagline { color:var(--text-muted); font-size:15px; margin-bottom:48px; line-height:1.7 }
  .pp-card-preview { display:flex; justify-content:center; gap:8px; margin-bottom:40px; flex-wrap:wrap }
  .pp-preview-card {
    width:36px; height:52px; border-radius:6px; border:1px solid var(--border-light);
    background:var(--bg-card); display:flex; align-items:center; justify-content:center;
    font-family:var(--font-display); font-size:15px; font-weight:400; color:var(--text-muted);
  }

  .pp-form-group { margin-bottom:16px; text-align:left }
  .pp-form-group label {
    font-family:var(--font-mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--text-dim); display:block; margin-bottom:7px;
  }
  .pp-input {
    width:100%; padding:10px 14px; background:var(--bg-card);
    border:1px solid var(--border-light); border-radius:6px; color:var(--text);
    font-family:var(--font-body); font-size:15px; outline:none; transition:border-color .2s;
  }
  .pp-input:focus { border-color:var(--azure) }
  .pp-input::placeholder { color:var(--text-dim) }
  .pp-divider {
    display:flex; align-items:center; gap:12px; margin:24px 0;
    color:var(--text-dim); font-size:12px; font-family:var(--font-mono);
  }
  .pp-divider::before,.pp-divider::after { content:''; flex:1; height:1px; background:var(--border) }
  .pp-btn {
    width:100%; padding:12px; border-radius:6px; font-size:15px; font-weight:500;
    font-family:var(--font-body); cursor:pointer; border:none; transition:all .18s;
  }
  .pp-btn-primary { background:var(--azure); color:#fff }
  .pp-btn-primary:hover { background:#1282d8; transform:translateY(-1px); box-shadow:0 4px 16px rgba(0,120,212,.3) }
  .pp-btn-ghost { background:transparent; color:var(--text-muted); border:1px solid var(--border-light); margin-top:10px }
  .pp-btn-ghost:hover { background:var(--bg-hover); color:var(--text) }

  /* ── Room ─────────────────────────────────────────────────────────── */
  .pp-room { display:none }
  .pp-room-header {
    display:flex; align-items:center; justify-content:space-between;
    gap:16px; margin-bottom:28px; flex-wrap:wrap;
  }
  .pp-room-info h2 { font-family:var(--font-display); font-size:22px; font-weight:400; color:var(--text) }
  .pp-room-code {
    font-family:var(--font-mono); font-size:11px; color:var(--text-dim);
    margin-top:3px; cursor:pointer; transition:color .2s;
  }
  .pp-room-code:hover { color:var(--azure-light) }
  .pp-room-code span { color:var(--azure-light); font-size:13px; letter-spacing:.06em }
  .pp-story-bar {
    background:var(--bg-card); border:1px solid var(--border); border-radius:8px;
    padding:14px 18px; margin-bottom:24px; display:flex; align-items:center; gap:12px; flex-wrap:wrap;
  }
  .pp-story-input {
    flex:1; min-width:180px; background:transparent; border:none; outline:none;
    color:var(--text); font-family:var(--font-body); font-size:15px;
  }
  .pp-story-input::placeholder { color:var(--text-dim) }

  /* ── Cards ────────────────────────────────────────────────────────── */
  .pp-cards-label {
    font-family:var(--font-mono); font-size:10px; letter-spacing:.1em;
    text-transform:uppercase; color:var(--text-dim); margin-bottom:14px;
  }
  .pp-cards { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:32px }
  .pp-card {
    width:62px; height:90px; border-radius:10px; border:2px solid var(--border-light);
    background:var(--bg-card); display:flex; align-items:center; justify-content:center;
    font-family:var(--font-display); font-size:22px; font-weight:400; color:var(--text-muted);
    cursor:pointer; transition:all .18s; user-select:none; position:relative;
  }
  .pp-card:hover { border-color:var(--azure-light); color:var(--text); transform:translateY(-4px); box-shadow:0 6px 18px rgba(0,0,0,0.2) }
  .pp-card.selected { border-color:var(--azure); background:var(--azure); color:#fff; transform:translateY(-6px); box-shadow:0 8px 24px rgba(0,120,212,.4) }
  .pp-card.selected::after { content:'✓'; position:absolute; top:4px; right:6px; font-size:10px; font-family:var(--font-body) }

  /* ── Players ──────────────────────────────────────────────────────── */
  .pp-players-label {
    font-family:var(--font-mono); font-size:10px; letter-spacing:.1em;
    text-transform:uppercase; color:var(--text-dim); margin-bottom:14px;
  }
  .pp-players { display:flex; flex-wrap:wrap; gap:12px; margin-bottom:32px }
  .pp-player {
    background:var(--bg-card); border:1px solid var(--border); border-radius:8px;
    padding:12px 16px; display:flex; align-items:center; gap:10px; min-width:140px;
  }
  .pp-player-avatar {
    width:32px; height:32px; border-radius:50%; background:var(--azure-glow);
    border:1px solid rgba(0,120,212,.3); display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:600; color:var(--azure-light); font-family:var(--font-mono); flex-shrink:0;
  }
  .pp-player-name { font-size:13px; font-weight:500; color:var(--text); line-height:1.2 }
  .pp-player-status { font-size:11px; color:var(--text-dim); font-family:var(--font-mono) }
  .pp-player.voted .pp-player-status { color:var(--green) }
  .pp-player-vote {
    font-family:var(--font-display); font-size:20px; font-weight:400;
    color:var(--azure-light); margin-left:auto; min-width:28px; text-align:right;
  }
  .pp-player.me { border-color:rgba(0,120,212,.35) }

  /* ── Actions ──────────────────────────────────────────────────────── */
  .pp-actions { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:32px }
  .pp-action-btn {
    padding:9px 20px; border-radius:6px; font-size:13px; font-weight:500;
    font-family:var(--font-body); cursor:pointer; border:none; transition:all .18s;
  }
  .pp-reveal-btn { background:var(--azure); color:#fff }
  .pp-reveal-btn:hover { background:#1282d8 }
  .pp-reveal-btn:disabled { opacity:.4; cursor:not-allowed }
  .pp-reset-btn { background:transparent; color:var(--text-muted); border:1px solid var(--border-light) }
  .pp-reset-btn:hover { background:var(--bg-hover); color:var(--text) }
  .pp-leave-btn { background:transparent; color:var(--text-dim); border:1px solid var(--border); font-size:12px; margin-left:auto }
  .pp-leave-btn:hover { color:#f87171; border-color:rgba(248,113,113,.4) }

  /* ── Results ──────────────────────────────────────────────────────── */
  .pp-results {
    background:var(--bg-card); border:1px solid var(--border); border-radius:10px;
    padding:24px; margin-bottom:24px; display:none;
  }
  .pp-results.visible { display:block }
  .pp-results-title {
    font-family:var(--font-mono); font-size:10px; letter-spacing:.1em;
    text-transform:uppercase; color:var(--text-dim); margin-bottom:16px;
  }
  .pp-results-avg { font-family:var(--font-display); font-size:42px; font-weight:300; color:var(--azure-light); line-height:1 }
  .pp-results-avg-label { font-size:12px; color:var(--text-dim); margin-top:4px; margin-bottom:20px }
  .pp-results-spread { display:flex; gap:10px; flex-wrap:wrap }
  .pp-result-pill { padding:5px 14px; border-radius:20px; font-family:var(--font-mono); font-size:13px }
  .pp-result-pill.outlier { background:rgba(245,166,35,.15); border:1px solid rgba(245,166,35,.4); color:var(--amber) }
  .pp-result-pill.majority { background:var(--azure-glow); border:1px solid rgba(0,120,212,.3); color:var(--azure-light) }
  [data-theme="light"] .pp-result-pill.majority { color:var(--azure) }

  /* ── Toast ────────────────────────────────────────────────────────── */
  .pp-toast {
    position:fixed; bottom:24px; left:50%;
    transform:translateX(-50%) translateY(80px);
    background:var(--bg-card); border:1px solid var(--border-light); border-radius:8px;
    padding:10px 18px; font-size:13px; color:var(--text);
    box-shadow:0 8px 24px rgba(0,0,0,.3); transition:transform .3s; z-index:999; white-space:nowrap;
  }
  .pp-toast.show { transform:translateX(-50%) translateY(0) }

  @media(max-width:600px) {
    .pp-card { width:52px; height:76px; font-size:18px }
    .topbar { padding:0 16px }
    .pp-page { padding:72px 16px 60px }
  }
  </style>
</head>
<body>

  <!-- ── Topbar ──────────────────────────────────────────────────────── -->
  <header class="topbar">
    <span class="topbar-logo">planning poker</span>
    <div class="topbar-right">
      <a class="topbar-gh" href="https://github.com/lavkeshdwivedi/planning-poker" target="_blank" rel="noopener">
        <svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        GitHub
      </a>
      <button class="theme-toggle" id="themeToggle" title="Toggle theme">&#9790;</button>
    </div>
  </header>

  <div class="pp-page">

    <!-- ── LOBBY ──────────────────────────────────────────────────────── -->
    <div class="pp-lobby" id="ppLobby">
      <div class="pp-logo">Planning <em>Poker</em></div>
      <p class="pp-tagline">Real-time estimation for agile teams. Create a room, share the code, everyone votes at the same time.</p>

      <div class="pp-card-preview">
        <div class="pp-preview-card">1</div>
        <div class="pp-preview-card">3</div>
        <div class="pp-preview-card">5</div>
        <div class="pp-preview-card">8</div>
        <div class="pp-preview-card">13</div>
        <div class="pp-preview-card">?</div>
      </div>

      <!-- Create room -->
      <div id="createSection">
        <div class="pp-form-group">
          <label>Your name</label>
          <input class="pp-input" id="createName" placeholder="e.g. Lavkesh" maxlength="24"/>
        </div>
        <div class="pp-form-group">
          <label>Room name (optional)</label>
          <input class="pp-input" id="createRoomName" placeholder="e.g. Sprint 42 Planning"/>
        </div>
        <button class="pp-btn pp-btn-primary" onclick="createRoom()">Create room</button>
      </div>

      <div class="pp-divider">or join existing</div>

      <!-- Join room -->
      <div id="joinSection">
        <div class="pp-form-group">
          <label>Your name</label>
          <input class="pp-input" id="joinName" placeholder="e.g. Priya" maxlength="24"/>
        </div>
        <div class="pp-form-group">
          <label>Room code</label>
          <input class="pp-input" id="joinCode" placeholder="6-character code" maxlength="6" style="text-transform:uppercase;letter-spacing:.12em;font-family:var(--font-mono);font-size:18px;"/>
        </div>
        <button class="pp-btn pp-btn-ghost" onclick="joinRoom()">Join room</button>
      </div>

      <p id="lobbyError" style="color:#f87171;font-size:13px;margin-top:14px;display:none;"></p>
    </div>

    <!-- ── ROOM ───────────────────────────────────────────────────────── -->
    <div class="pp-room" id="ppRoom">

      <div class="pp-room-header">
        <div class="pp-room-info">
          <h2 id="roomTitle">Planning Poker</h2>
          <div class="pp-room-code" onclick="copyCode()" title="Click to copy">
            Room code: <span id="roomCodeDisplay"></span> &nbsp;&#x2398;
          </div>
        </div>
        <div class="pp-actions">
          <button class="pp-action-btn pp-reveal-btn" id="revealBtn" onclick="revealVotes()" disabled>Reveal votes</button>
          <button class="pp-action-btn pp-reset-btn" onclick="resetVotes()">New round</button>
          <button class="pp-action-btn pp-leave-btn" onclick="leaveRoom()">Leave</button>
        </div>
      </div>

      <!-- Story bar -->
      <div class="pp-story-bar">
        <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-dim);letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;">Story</span>
        <input class="pp-story-input" id="storyInput" placeholder="What are you estimating? Type here..." maxlength="120" oninput="updateStory()"/>
      </div>

      <!-- Results (shown after reveal) -->
      <div class="pp-results" id="ppResults">
        <div class="pp-results-title">Results</div>
        <div class="pp-results-avg" id="resultsAvg">-</div>
        <div class="pp-results-avg-label">average (excluding ?, ☕)</div>
        <div class="pp-results-spread" id="resultsSpread"></div>
      </div>

      <!-- Voting cards -->
      <div class="pp-cards-label">Your vote</div>
      <div class="pp-cards" id="ppCards"></div>

      <!-- Players -->
      <div class="pp-players-label">In the room <span id="playerCount" style="color:var(--text-dim)"></span></div>
      <div class="pp-players" id="ppPlayers"></div>

    </div>
  </div>

  <div class="pp-toast" id="ppToast"></div>

  <script>
  // ─────────────────────────────────────────────────────────────────────────────
  // Firebase config
  // Replace this with your own Firebase project config.
  // Get it from: Firebase Console → Project Settings → Your apps → SDK snippet
  // ─────────────────────────────────────────────────────────────────────────────
  const firebaseConfig = {
    apiKey:            "YOUR_API_KEY",
    authDomain:        "YOUR_PROJECT_ID.firebaseapp.com",
    databaseURL:       "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
    projectId:         "YOUR_PROJECT_ID",
    storageBucket:     "YOUR_PROJECT_ID.firebasestorage.app",
    messagingSenderId: "YOUR_SENDER_ID",
    appId:             "YOUR_APP_ID"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // ── State ─────────────────────────────────────────────────────────────────
  const CARDS = ['0','1','2','3','5','8','13','21','34','?','☕'];
  let myId     = null;
  let roomId   = null;
  let roomRef  = null;
  let isHost   = false;
  let myVote   = null;
  let revealed = false;

  // ── Helpers ───────────────────────────────────────────────────────────────
  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function genId(len) {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let s = '';
    for (let i = 0; i < len; i++) s += chars[Math.floor(Math.random() * chars.length)];
    return s;
  }

  function showToast(msg, dur=2400) {
    const t = document.getElementById('ppToast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), dur);
  }

  function showError(msg) {
    const el = document.getElementById('lobbyError');
    el.textContent = msg;
    el.style.display = msg ? 'block' : 'none';
  }

  function initials(name) {
    return name.trim().split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
  }

  function setLoading(btnEl, loading, text) {
    btnEl.disabled = loading;
    btnEl.textContent = loading ? 'Connecting...' : text;
  }

  // ── Room creation ─────────────────────────────────────────────────────────
  async function createRoom() {
    const name     = document.getElementById('createName').value.trim();
    const roomName = document.getElementById('createRoomName').value.trim() || 'Planning Poker';
    if (!name) { showError('Enter your name first.'); return; }
    showError('');

    const btn = document.querySelector('#createSection .pp-btn-primary');
    setLoading(btn, true, 'Create room');

    try {
      myId   = genId(8);
      roomId = genId(6);
      isHost = true;

      roomRef = db.ref('pp_rooms/' + roomId);
      await roomRef.set({
        name:      roomName,
        host:      myId,
        revealed:  false,
        story:     '',
        createdAt: Date.now(),
        players: {
          [myId]: { name, vote: null, joinedAt: Date.now() }
        }
      });

      roomRef.onDisconnect().update({ [`players/${myId}/online`]: false });
      enterRoom(roomId, name);
    } catch (err) {
      console.error('createRoom error:', err);
      showError('Could not create room. Check your internet connection and try again.');
      setLoading(btn, false, 'Create room');
    }
  }

  // ── Room join ─────────────────────────────────────────────────────────────
  async function joinRoom() {
    const name = document.getElementById('joinName').value.trim();
    const code = document.getElementById('joinCode').value.trim().toUpperCase();
    if (!name) { showError('Enter your name.'); return; }
    if (code.length !== 6) { showError('Room code must be 6 characters.'); return; }
    showError('');

    const btn = document.querySelector('#joinSection .pp-btn-ghost');
    setLoading(btn, true, 'Join room');

    try {
      const snap = await db.ref('pp_rooms/' + code).get();
      if (!snap.exists()) {
        showError('Room not found. Check the code and try again.');
        setLoading(btn, false, 'Join room');
        return;
      }

      myId   = genId(8);
      roomId = code;
      isHost = snap.val().host === myId;

      roomRef = db.ref('pp_rooms/' + roomId);
      await roomRef.child('players/' + myId).set({ name, vote: null, joinedAt: Date.now() });
      roomRef.onDisconnect().update({ [`players/${myId}/online`]: false });

      enterRoom(roomId, name);
    } catch (err) {
      console.error('joinRoom error:', err);
      showError('Could not join room. Check your internet connection and try again.');
      setLoading(btn, false, 'Join room');
    }
  }

  // ── Enter room (common setup) ─────────────────────────────────────────────
  function enterRoom(code, myName) {
    showError('');
    document.getElementById('ppLobby').style.display = 'none';
    const roomEl = document.getElementById('ppRoom');
    roomEl.style.display = 'block';
    document.getElementById('roomCodeDisplay').textContent = code;
    window.location.hash = code;

    // Build cards
    const cardsEl = document.getElementById('ppCards');
    cardsEl.innerHTML = '';
    CARDS.forEach(val => {
      const card = document.createElement('div');
      card.className = 'pp-card';
      card.textContent = val;
      card.onclick = () => castVote(val, card);
      cardsEl.appendChild(card);
    });

    // Listen for room changes
    roomRef.on('value', snap => {
      if (!snap.exists()) { leaveRoom(); return; }
      renderRoom(snap.val());
    });
  }

  // ── Render room state ─────────────────────────────────────────────────────
  function renderRoom(data) {
    revealed = !!data.revealed;
    isHost   = data.host === myId;

    document.getElementById('roomTitle').textContent = data.name || 'Planning Poker';

    const storyEl = document.getElementById('storyInput');
    if (document.activeElement !== storyEl) storyEl.value = data.story || '';

    const revealBtn  = document.getElementById('revealBtn');
    const players    = data.players || {};
    const votes      = Object.values(players).map(p => p.vote);
    const anyVoted   = votes.some(v => v !== null);
    revealBtn.disabled      = !isHost || !anyVoted || revealed;
    revealBtn.style.display = isHost ? 'inline-flex' : 'none';

    // Players list
    const playersEl = document.getElementById('ppPlayers');
    playersEl.innerHTML = '';
    const playerList = Object.entries(players);
    document.getElementById('playerCount').textContent = '(' + playerList.length + ')';

    playerList.forEach(([id, p]) => {
      const hasVoted = p.vote !== null;
      const div = document.createElement('div');
      div.className = 'pp-player' + (hasVoted ? ' voted' : '') + (id === myId ? ' me' : '');
      div.innerHTML = `
        <div class="pp-player-avatar">${escHtml(initials(p.name))}</div>
        <div>
          <div class="pp-player-name">${escHtml(p.name)}${id === myId ? ' <span style="color:var(--text-dim);font-size:11px;">(you)</span>' : ''}</div>
          <div class="pp-player-status">${hasVoted ? (revealed ? '' : 'voted') : 'thinking...'}</div>
        </div>
        <div class="pp-player-vote">${revealed && hasVoted ? escHtml(p.vote) : (hasVoted ? '✓' : '')}</div>
      `;
      playersEl.appendChild(div);
    });

    // Sync card selection
    document.querySelectorAll('.pp-card').forEach(c => {
      c.classList.toggle('selected', c.textContent === myVote);
    });

    // Results
    const resultsEl = document.getElementById('ppResults');
    if (revealed) {
      resultsEl.classList.add('visible');
      const numericVotes = votes
        .filter(v => v !== null && v !== '?' && v !== '☕')
        .map(Number)
        .filter(n => !isNaN(n));
      const avg = numericVotes.length
        ? (numericVotes.reduce((a,b) => a+b, 0) / numericVotes.length).toFixed(1)
        : '-';
      document.getElementById('resultsAvg').textContent = avg;

      const tally = {};
      votes.filter(v => v !== null).forEach(v => { tally[v] = (tally[v]||0) + 1; });
      const maxCount = Math.max(...Object.values(tally));
      const spreadEl = document.getElementById('resultsSpread');
      spreadEl.innerHTML = '';
      Object.entries(tally).sort((a,b) => b[1]-a[1]).forEach(([val, count]) => {
        const pill = document.createElement('div');
        pill.className = 'pp-result-pill ' + (count === maxCount ? 'majority' : 'outlier');
        pill.textContent = `${val}  x${count}`;
        spreadEl.appendChild(pill);
      });
    } else {
      resultsEl.classList.remove('visible');
    }
  }

  // ── Voting ────────────────────────────────────────────────────────────────
  function castVote(val, cardEl) {
    if (revealed) return;
    if (myVote === val) {
      myVote = null;
      roomRef.child('players/' + myId + '/vote').set(null);
    } else {
      myVote = val;
      roomRef.child('players/' + myId + '/vote').set(val);
    }
    document.querySelectorAll('.pp-card').forEach(c => {
      c.classList.toggle('selected', c.textContent === myVote);
    });
  }

  // ── Host actions ──────────────────────────────────────────────────────────
  function revealVotes() {
    if (!isHost) return;
    roomRef.update({ revealed: true });
  }

  function resetVotes() {
    myVote = null;
    const updates = { revealed: false, story: document.getElementById('storyInput').value };
    roomRef.child('players').get().then(snap => {
      if (snap.exists()) {
        Object.keys(snap.val()).forEach(id => { updates[`players/${id}/vote`] = null; });
      }
      roomRef.update(updates);
    });
  }

  function updateStory() {
    if (!roomRef) return;
    roomRef.update({ story: document.getElementById('storyInput').value });
  }

  // ── Copy code ─────────────────────────────────────────────────────────────
  function copyCode() {
    const url = window.location.origin + window.location.pathname + '#' + roomId;
    navigator.clipboard.writeText(url)
      .then(() => showToast('Room link copied!'))
      .catch(() => {
        navigator.clipboard.writeText(roomId)
          .then(() => showToast('Room code copied: ' + roomId));
      });
  }

  // ── Leave ─────────────────────────────────────────────────────────────────
  function leaveRoom() {
    if (roomRef && myId) roomRef.child('players/' + myId).remove();
    if (roomRef) roomRef.off();
    roomRef = null; roomId = null; myId = null; myVote = null; revealed = false;
    document.getElementById('ppRoom').style.display  = 'none';
    document.getElementById('ppLobby').style.display = 'block';
    window.location.hash = '';
  }

  // ── Auto-join from URL hash ───────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', function() {
    const hash = window.location.hash.replace('#','').trim().toUpperCase();
    if (hash.length === 6) {
      document.getElementById('joinCode').value = hash;
      document.getElementById('joinName').focus();
    }
  });

  // ── Theme toggle ──────────────────────────────────────────────────────────
  (function() {
    var saved = localStorage.getItem('theme');
    var h = new Date().getHours();
    var theme = saved || (h >= 7 && h < 19 ? 'light' : 'dark');
    document.documentElement.setAttribute('data-theme', theme);
    var btn = document.getElementById('themeToggle');
    if (btn) btn.textContent = theme === 'dark' ? '\u2600' : '\u263e';
  })();

  document.addEventListener('DOMContentLoaded', function() {
    var btn = document.getElementById('themeToggle');
    if (!btn) return;
    btn.addEventListener('click', function() {
      var cur  = document.documentElement.getAttribute('data-theme');
      var next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      btn.textContent = next === 'dark' ? '\u2600' : '\u263e';
    });
  });
  </script>
</body>
</html>
